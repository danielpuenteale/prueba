<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">

      :root{

        --background: #ffeeff;
        --foreground: #113311;
      }

      .dark{
        --background: #113311;
        --foreground: #ffeeff;

      }

      @theme{

        --color-background: var(--background);

        --color foreground: var(--foreground);
      }

    </style>
  </head>
  <body class="bg-neutral-100 dark:bg-background text-foreground">
    <div>
        <header class="flex justify-between items-center border-b p-2">
            <h1 class="text-[30px] text-red-300 font-[700] underline">Hello world!</h1>
            <button onclick="cambiarTema()" class="cursor-pointer px-4 rounded-xl hover: bg-orange-500">Dark</button>
        </header>
        <script>
          function cambiarTema(){
            document.documentElement.
            classList.toggle("dark")
          }
        </script>
    </div>
  </body>
</html>
